<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="assets/space.png" type="image/png" />
    <title>13기 아기사자</title>
  </head>
  <body>
    <div class="space-container">
      <div class="star-wrapper">
        <img src="assets/babylion.png" alt="크아앙" />
      </div>
      <div class="planet planet--top" style="--bg-url: url('assets/goal.jpg')">
        <img class="planet-img" src="assets/planet4.png" />
      </div>
      <div class="planet planet--left" style="--bg-url: url('assets/pli.png')">
        <img class="planet-img" src="assets/planet3.png" />
      </div>
      <div
        class="planet planet--right"
        style="--bg-url: url('assets/Hobby.jpeg')"
      >
        <img class="planet-img" src="assets/planet2.png" />
      </div>
      <div
        class="planet planet--bottom"
        style="--bg-url: url('assets/babylion.png')"
      >
        <img class="planet-img" src="assets/planet1.png" />
      </div>
    </div>
    <div class="logo">
      <img class="logo-img" src="assets/likelion.svg" alt="크아앙" />
    </div>
    <script src="index.js"></script>
  </body>
</html>
