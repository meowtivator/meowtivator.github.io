<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="assets/space.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=My+Soul&display=swap"
      rel="stylesheet"
    />
    <title>13기 아기사자</title>
  </head>
  <body>
    <div class="space-container">
      <div
        class="planet planet--top"
        id="top"
        style="--bg-url: url('assets/goal.jpg')"
      >
        <img class="planet-img" src="assets/planet4.png" draggable="false" />
      </div>
      <div
        class="planet planet--bottom"
        id="bottom"
        style="--bg-url: url('assets/pli.png')"
      >
        <img class="planet-img" src="assets/planet3.png" draggable="false" />
        <div class="ring-container">
          <span class="ring-letter" style="--i: 0">C</span>
          <span class="ring-letter" style="--i: 19">l</span>
          <span class="ring-letter" style="--i: 38">i</span>
          <span class="ring-letter" style="--i: 57">c</span>
          <span class="ring-letter" style="--i: 76">k</span>
          <span class="ring-letter" style="--i: 95">&nbsp;</span>
          <span class="ring-letter" style="--i: 114">m</span>
          <span class="ring-letter" style="--i: 133">e</span>
          <span class="ring-letter" style="--i: 152">!</span>
          <span class="ring-letter" style="--i: 171">&nbsp;</span>
          <span class="ring-letter" style="--i: 190">C</span>
          <span class="ring-letter" style="--i: 209">l</span>
          <span class="ring-letter" style="--i: 228">i</span>
          <span class="ring-letter" style="--i: 247">c</span>
          <span class="ring-letter" style="--i: 266">k</span>
          <span class="ring-letter" style="--i: 285">&nbsp;</span>
          <span class="ring-letter" style="--i: 304">m</span>
          <span class="ring-letter" style="--i: 323">e</span>
          <span class="ring-letter" style="--i: 342">!</span>
        </div>
      </div>
      <div
        class="planet planet--left"
        id="left"
        style="--bg-url: url('assets/Hobby.jpeg')"
      >
        <img class="planet-img" src="assets/planet2.png" draggable="false" />
      </div>
      <div
        class="planet planet--right"
        id="right"
        style="--bg-url: url('assets/babylion.png')"
      >
        <img class="planet-img" src="assets/planet1.png" draggable="false" />
      </div>
    </div>
    <div class="panel">
      <p class="panel-title">Now Playing</p>
      <p class="panel-sum">간단한 요약</p>
      <p class="panel-des">공사 중</p>
      <img class="panel-img" src="" alt="" />
    </div>
    <div class="logo">
      <img
        class="logo-img"
        src="assets/likelion.svg"
        alt="크아앙"
        draggable="false"
      />
    </div>
    <script src="planet.js"></script>
  </body>
</html>
