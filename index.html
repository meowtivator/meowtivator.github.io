<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/music.css" />
    <link rel="stylesheet" href="css/panel.css" />
    <link rel="stylesheet" href="css/planet.css" />
    <link rel="icon" href="assets/space.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=My+Soul&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Text:ital@0;1&family=My+Soul&display=swap"
      rel="stylesheet"
    />
    <title>13기 아기사자</title>
  </head>
  <body>
    <div class="space-container">
      <div
        class="planet planet--top"
        id="Goal"
        style="--bg-url: url('../assets/goal.jpg')"
      >
        <img class="planet-img" src="assets/planet4.png" draggable="false" />
      </div>
      <div
        class="planet planet--bottom"
        id="Playlist"
        style="--bg-url: url('../assets/pli.png')"
      >
        <img class="planet-img" src="assets/planet3.png" draggable="false" />

        <button id="music-btn" class="play-btn"></button>
      </div>
      <div
        class="planet planet--left"
        id="Hobby"
        style="--bg-url: url('../assets/Hobby.jpeg')"
      >
        <img class="planet-img" src="assets/planet2.png" draggable="false" />
      </div>
      <div
        class="planet planet--right"
        id="Intro"
        style="--bg-url: url('../assets/babylion.png')"
      >
        <img class="planet-img" src="assets/planet1.png" draggable="false" />
      </div>
    </div>
    <div class="panel-wrapper" style="--top: 35%; --left: 50%">
      <div class="panel intro">
        <p class="panel-title">Now Playing</p>
        <p class="panel-sum">간단한 요약</p>
        <p class="panel-divline"></p>
        <p class="panel-des">공사 중</p>
        <button class="intro-btn">TMI 보기!</button>
      </div>
    </div>
    <div class="panel-wrapper" style="--top: 150%; --left: 25%">
      <div class="panel sub">
        <p class="sub-panel-title"></p>
        <p class="panel-divline"></p>
        <p class="sub-panel-des"></p>
        <div class="panel-links">
          <a
            href="https://www.instagram.com/oow3aj?igsh=MW94N2ttYm85bzBwOQ=="
            target="_blank"
          >
            <img src="assets/instagram-icon.webp" alt="instagram" />
          </a>
          <a href="https://github.com/meowtivator" target="_blank">
            <img src="assets/github-icon.png" alt="github" />
          </a>
          <a href="https://solved.ac/profile/jdev0229" target="_blank">
            <img src="assets/solvedac-icon.jpg" alt="solvedac" />
          </a>
        </div>
        <img class="panel-img" src="" alt="" />
        <button class="back-btn">뒤로 가기!</button>
      </div>
    </div>
    <div class="label">
      <p class="label--left">Hobby</p>
      <p class="label--right">Intro</p>
    </div>
    <div class="logo">
      <img
        class="logo-img"
        src="assets/likelion.svg"
        alt="크아앙"
        draggable="false"
      />
    </div>
    <audio id="bg-music" src="assets/bgAudio.mp3"></audio>
    <script src="planet.js"></script>
  </body>
</html>
