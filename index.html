<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="assets/space.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=My+Soul&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Text:ital@0;1&family=My+Soul&display=swap"
      rel="stylesheet"
    />
    <title>13기 아기사자</title>
  </head>
  <body>
    <div class="space-container">
      <div
        class="planet planet--top"
        id="top"
        style="--bg-url: url('assets/goal.jpg')"
      >
        <img class="planet-img" src="assets/planet4.png" draggable="false" />
      </div>
      <div
        class="planet planet--bottom"
        id="bottom"
        style="--bg-url: url('assets/pli.png')"
      >
        <img class="planet-img" src="assets/planet3.png" draggable="false" />
        <div class="ring-container">
          <span class="ring-letter" style="--i: 0">C</span>
          <span class="ring-letter" style="--i: 13">l</span>
          <span class="ring-letter" style="--i: 26">i</span>
          <span class="ring-letter" style="--i: 39">c</span>
          <span class="ring-letter" style="--i: 52">k</span>
          <span class="ring-letter" style="--i: 65">!</span>
          <span class="ring-letter" style="--i: 78">&nbsp;</span>
          <span class="ring-letter" style="--i: 91">C</span>
          <span class="ring-letter" style="--i: 104">l</span>
          <span class="ring-letter" style="--i: 117">i</span>
          <span class="ring-letter" style="--i: 130">c</span>
          <span class="ring-letter" style="--i: 143">k</span>
          <span class="ring-letter" style="--i: 156">!</span>
          <span class="ring-letter" style="--i: 169">&nbsp;</span>
          <span class="ring-letter" style="--i: 182">C</span>
          <span class="ring-letter" style="--i: 195">l</span>
          <span class="ring-letter" style="--i: 208">i</span>
          <span class="ring-letter" style="--i: 221">c</span>
          <span class="ring-letter" style="--i: 234">k</span>
          <span class="ring-letter" style="--i: 247">!</span>
          <span class="ring-letter" style="--i: 260">&nbsp;</span>
          <span class="ring-letter" style="--i: 273">C</span>
          <span class="ring-letter" style="--i: 286">l</span>
          <span class="ring-letter" style="--i: 299">i</span>
          <span class="ring-letter" style="--i: 312">c</span>
          <span class="ring-letter" style="--i: 325">k</span>
          <span class="ring-letter" style="--i: 338">!</span>
          <span class="ring-letter" style="--i: 351">&nbsp;</span>
        </div>
        <button id="music-btn" class="play-btn"></button>
      </div>
      <div
        class="planet planet--left"
        id="left"
        style="--bg-url: url('assets/Hobby.jpeg')"
      >
        <img class="planet-img" src="assets/planet2.png" draggable="false" />
      </div>
      <div
        class="planet planet--right"
        id="right"
        style="--bg-url: url('assets/babylion.png')"
      >
        <img class="planet-img" src="assets/planet1.png" draggable="false" />
      </div>
    </div>
    <div class="panel">
      <p class="panel-title">Now Playing</p>
      <p class="panel-sum">간단한 요약</p>
      <p class="panel-des">공사 중</p>
      <img class="panel-img" src="" alt="" />
    </div>
    <div class="logo">
      <img
        class="logo-img"
        src="assets/likelion.svg"
        alt="크아앙"
        draggable="false"
      />
    </div>
    <audio id="bg-music" src="assets/bgAudio.mp3"></audio>
    <script src="planet.js"></script>
  </body>
</html>
